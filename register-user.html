<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Page settings and style link -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enroll User in Station | iHelper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Main page container with background and padding from CSS -->
  <div class="container">
    <!-- Page heading and short description -->
    <h1>Enroll User in Station</h1>
    <p>Enroll a new user into the station system.</p>

    <!-- Form for entering username and choosing station -->
    <form onsubmit="event.preventDefault();">
      <!-- Input for the username -->
      <label for="username" style="display:block; margin-bottom:0.75rem; text-align:left;">Username</label>
      <input id="username" type="text" placeholder="Enter username" style="width:100%; max-width:360px; padding:0.75rem; margin-bottom:1rem; border:1px solid #ccc; border-radius:8px;">

      <!-- Dropdown menu to choose which station to assign -->
      <label for="station" style="display:block; margin-bottom:0.75rem; text-align:left;">Select Station</label>
      <select id="station" style="width:100%; max-width:360px; padding:0.75rem; margin-bottom:1rem; border:1px solid #ccc; border-radius:8px;">
        <option value="">Choose a station</option>
        <option value="Station A">Station A</option>
        <option value="Station B">Station B</option>
        <option value="Station C">Station C</option>
        <option value="Station D">Station D</option>
      </select>

      <!-- Button area for assigning the station -->
      <div style="display:flex; flex-wrap:wrap; gap:0.75rem; justify-content:center;">
        <button type="button" onclick="assignStation()" style="flex:1 1 150px; max-width:180px;">Assign Station</button>
      </div>
    </form>

    <!-- A simple button to go back to the home page -->
    <button onclick="window.location.href='Index.html'" style="margin-top:1rem; background:#6b7280;">Back to Home</button>

    <!-- JavaScript function that runs when user clicks Assign Station -->
    <script>
      function assignStation() {
        // Get the entered username from the page
        const user = document.getElementById('username').value.trim();
        // Get the selected station from the dropdown
        const station = document.getElementById('station').value;

        // If no username is entered, show a message and stop
        if (!user) {
          alert('Please enter a username first.');
          return;
        }

        // If no station is selected, show a message and stop
        if (!station) {
          alert('Please select a station to assign.');
          return;
        }

        // Show a confirmation message that the user was assigned
        alert('Assigned ' + user + ' to ' + station + '.');
      }
    </script>
  </div>
</body>
</html>
