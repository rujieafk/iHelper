<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Page title and shared CSS file for styling -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import ISBN Transmission | iHelper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="import-page">
  <!-- Main container for import page content -->
  <div class="container">
    <h1 style="margin-left:25px;">Import ISBN Transmission</h1>
    

    <!-- Form for adding multiple ISBN entries at once -->
    <!-- Accepts multiple ISBN values separated by commas or new lines -->
    <form style="display: flex; flex-direction: column; align-items: center;">
  <textarea id="isbn-import" rows="6" placeholder="Enter ISBNs separated by commas or new lines" style="width:100%; resize: none;; padding:0.75rem; margin-bottom:1rem; border:1px solid #D3DAD9; border-radius:8px;"></textarea>

  <label for="transmitted-date" style="display:block; margin-bottom:0.75rem; text-align:left;">Transmitted Date</label>
  <input id="transmitted-date" type="text" placeholder="MM-DD-YYYY" style="width:100%; max-width:360px; padding:0.75rem; margin-bottom:1rem; border:1px solid #D3DAD9; border-radius:8px;">
  <small style="display:block; margin-bottom:1rem; color:#D3DAD9; text-align:left;">Enter date in MM-DD-YYYY format, or leave blank to use today.</small>

  <button style="padding: 0.5rem 1rem;" id="importBtn" type="button">Import ISBNs</button>
</form>

    <!-- Navigation button back to home page -->
    <button onclick="window.location.href='Index.html'" id="backBtn">Back to Home</button>
  </div>
  <script src="insertTransmittedISBN.js"></script>
</body>
</html>
